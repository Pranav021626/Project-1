{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}

<style>
.profile-card {
    max-width: 420px;
    margin: 40px auto;
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease-in-out;
}

.profile-card img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    margin-bottom: 15px;
}

.profile-card h2 {
    margin: 10px 0 5px;
}

.profile-card p {
    font-size: 14px;
    opacity: 0.9;
}

.profile-card input {
    margin-top: 15px;
    color: white;
}

.profile-card button {
    margin-top: 15px;
    padding: 10px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #764ba2;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.profile-card button:hover {
    background: #f0f0f0;
    transform: scale(1.05);
}

/* DELETE BUTTON STYLE */
.delete-btn {
    margin-top: 15px;
    padding: 10px 25px;
    border: none;
    border-radius: 25px;
    background: red;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.delete-btn:hover {
    background: darkred;
    transform: scale(1.05);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

<div class="profile-card">

    <!-- UPDATE PROFILE FORM -->
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <img src="{{ user.profile.image.url }}" alt="Profile">

        <h2>{{ user.username }}</h2>
        <p>{{ user.email }}</p>

        <input type="file" name="image">
        <br>
        <button type="submit">Update Profile</button>
    </form>

    <!-- DELETE ACCOUNT FORM -->
    <form method="POST" action="{% url 'delete_account' %}">
        {% csrf_token %}
        <button type="submit" class="delete-btn"
        onclick="return confirm('Are you sure you want to delete your account?')">
            Delete Account
        </button>
    </form>

</div>

{% endblock %}
