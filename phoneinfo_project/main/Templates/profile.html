<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 0;
        }
        .profile-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .profile-container img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #4CAF50;
        }
        .profile-container h1 {
            margin: 10px 0;
            color: #333;
        }
        .profile-container p {
            color: #777;
            font-size: 16px;
        }
        .profile-container a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #4CAF50;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            transition: 0.3s;
        }
        .profile-container a:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <img src="https://via.placeholder.com/120" alt="Profile Picture">
        <h1>{{ user.username }}</h1>
        <p>Email: {{ user.email }}</p>
        <p>Welcome to your profile page!</p>
        <a href="{% url 'logout' %}">Logout</a>
    </div>
</body>
</html>
